<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정렬 알고리즘 시각화 시뮬레이터</title>
  <!-- Tailwind CSS CDN 탑재 (화사한 테마 렌더링 엔진) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 18 및 ReactDOM 18 CDN 탑재 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel CDN 탑재 (브라우저 실시간 JSX 컴파일러) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* 스크롤바 디자인 최적화 및 폰트 부드럽게 설정 */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
</head>
<body class="bg-slate-50/70">

  <!-- React 앱이 렌더링될 타겟 루트 노드 -->
  <div id="root"></div>

  <!-- Babel 컴파일러가 해석할 스크립트 영역 -->
  <script type="text/babel">
    // React 전역 변수에서 훅(Hook) 안전하게 꺼내기 (Import 문 에러 원천 방지)
    const { useState, useEffect, useRef } = React;

    // === 라인 아트 SVG 아이콘 ===
    const PlayIcon = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
      </svg>
    );

    const PauseIcon = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M10 9v6m4-6v6" />
      </svg>
    );

    const PrevIcon = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" />
      </svg>
    );

    const NextIcon = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7" />
      </svg>
    );

    const ResetIcon = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 15.19M9 5.513a11.95 11.95 0 00-5.3 11.94" />
      </svg>
    );

    const BookOpenIcon = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
        <path strokeLinecap="round" strokeLinejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
      </svg>
    );

    // === 정렬 알고리즘 엔진 헬퍼 함수 정의 ===
    const generateSelectionSortSteps = (initialArray) => {
      let arr = [...initialArray];
      let stepsList = [];
      let compareCount = 0;
      let swapCount = 0;
      
      stepsList.push({
        array: [...arr],
        comparing: [],
        swapping: [],
        sorted: [],
        compareCount,
        swapCount,
        desc: "선택 정렬(Selection Sort) 시뮬레이션을 준비합니다. 배열 내 무작위 숫자에서 최솟값을 순서대로 검색하여 앞으로 보냅니다."
      });

      for (let i = 0; i < arr.length - 1; i++) {
        let minIdx = i;
        stepsList.push({
          array: [...arr],
          comparing: [i],
          swapping: [],
          sorted: Array.from({ length: i }, (_, k) => k),
          compareCount,
          swapCount,
          desc: `기준 자리를 인덱스 ${i}번(값: ${arr[i]})으로 잡았습니다. 이 위치에 들어갈 새로운 최솟값을 우측에서 탐색합니다.`
        });

        for (let j = i + 1; j < arr.length; j++) {
          compareCount++;
          stepsList.push({
            array: [...arr],
            comparing: [minIdx, j],
            swapping: [],
            sorted: Array.from({ length: i }, (_, k) => k),
            compareCount,
            swapCount,
            desc: `현재 찾은 최솟값 후보 ${arr[minIdx]}와 우측 원소 ${arr[j]}의 값을 비교합니다. (현재까지 누적 비교 횟수: ${compareCount}회)`
          });

          if (arr[j] < arr[minIdx]) {
            minIdx = j;
            stepsList.push({
              array: [...arr],
              comparing: [minIdx],
              swapping: [],
              sorted: Array.from({ length: i }, (_, k) => k),
              compareCount,
              swapCount,
              desc: `더 작은 값(${arr[minIdx]})이 식별되었습니다. 최솟값 대상 인덱스를 ${minIdx}번으로 새로 저장합니다.`
            });
          }
        }

        if (minIdx !== i) {
          swapCount++;
          stepsList.push({
            array: [...arr],
            comparing: [],
            swapping: [i, minIdx],
            sorted: Array.from({ length: i }, (_, k) => k),
            compareCount,
            swapCount,
            desc: `비교 탐색이 종료되었습니다. 최종 최솟값(${arr[minIdx]})과 정렬 기준 위치의 값(${arr[i]})을 서로 교환합니다.`
          });
          let temp = arr[i];
          arr[i] = arr[minIdx];
          arr[minIdx] = temp;
        } else {
          stepsList.push({
            array: [...arr],
            comparing: [],
            swapping: [],
            sorted: Array.from({ length: i + 1 }, (_, k) => k),
            compareCount,
            swapCount,
            desc: `탐색 영역 내의 최솟값이 이미 기준 위치 원소(${arr[i]})이므로 자리를 바꾸지 않고 정렬을 완료 처리합니다.`
          });
        }
      }
      
      stepsList.push({
        array: [...arr],
        comparing: [],
        swapping: [],
        sorted: Array.from({ length: arr.length }, (_, k) => k),
        compareCount,
        swapCount,
        desc: "모든 패스(Pass)가 순차적으로 완료되어 정렬 작업이 정상적으로 종료되었습니다! 🎉"
      });
      
      return stepsList;
    };

    const generateQuickSortSteps = (initialArray) => {
      let arr = [...initialArray];
      let stepsList = [];
      let sortedIndices = new Set();
      let compareCount = 0;
      let swapCount = 0;

      stepsList.push({
        array: [...arr],
        comparing: [],
        swapping: [],
        sorted: [],
        pivot: -1,
        left: -1,
        right: -1,
        compareCount,
        swapCount,
        desc: "퀵 정렬(Quick Sort) 시뮬레이션을 준비합니다. 기준값(피벗)을 설정하고 이를 경계로 배열을 분할해 나갑니다."
      });

      const quickSortHelper = (l, r) => {
        if (l >= r) {
          if (l === r) {
            sortedIndices.add(l);
          }
          return;
        }

        let pivotIdx = l;
        let pivotVal = arr[pivotIdx];

        stepsList.push({
          array: [...arr],
          comparing: [],
          swapping: [],
          sorted: Array.from(sortedIndices),
          pivot: pivotIdx,
          left: l + 1,
          right: r,
          compareCount,
          swapCount,
          desc: `현재 영역 [${l} ~ ${r}]의 첫 번째 원소인 ${pivotVal}을 피벗(기준값 👑)으로 결정하였습니다.`
        });

        let i = l + 1;
        let j = r;

        while (i <= j) {
          // i 탐색
          while (i <= r && arr[i] <= pivotVal) {
            compareCount++;
            stepsList.push({
              array: [...arr],
              comparing: [pivotIdx, i],
              swapping: [],
              sorted: Array.from(sortedIndices),
              pivot: pivotIdx,
              left: i,
              right: j,
              compareCount,
              swapCount,
              desc: `왼쪽 포인터 i가 피벗(${pivotVal})보다 큰 요소를 탐색합니다. (인덱스: ${i}, 값: ${arr[i]})`
            });
            i++;
          }
          if (i <= r) compareCount++;

          // j 탐색
          while (j > l && arr[j] >= pivotVal) {
            compareCount++;
            stepsList.push({
              array: [...arr],
              comparing: [pivotIdx, j],
              swapping: [],
              sorted: Array.from(sortedIndices),
              pivot: pivotIdx,
              left: Math.min(i, r),
              right: j,
              compareCount,
              swapCount,
              desc: `오른쪽 포인터 j가 피벗(${pivotVal})보다 작은 요소를 탐색합니다. (인덱스: ${j}, 값: ${arr[j]})`
            });
            j--;
          }
          if (j > l) compareCount++;

          if (i < j) {
            swapCount++;
            stepsList.push({
              array: [...arr],
              comparing: [],
              swapping: [i, j],
              sorted: Array.from(sortedIndices),
              pivot: pivotIdx,
              left: i,
              right: j,
              compareCount,
              swapCount,
              desc: `조건이 일치하는 한 쌍을 찾았습니다. i 위치의 값(${arr[i]})과 j 위치의 값(${arr[j]})을 서로 맞바꿉니다.`
            });
            let temp = arr[i];
            arr[i] = arr[j];
            arr[j] = temp;
          }
        }

        if (pivotIdx !== j) {
          swapCount++;
          stepsList.push({
            array: [...arr],
            comparing: [],
            swapping: [pivotIdx, j],
            sorted: Array.from(sortedIndices),
            pivot: pivotIdx,
            left: i,
            right: j,
            compareCount,
            swapCount,
            desc: `탐색 지점 i와 j가 교차(엇갈림)되었습니다. 피벗값(${pivotVal})을 경계 위치인 j번 요소(${arr[j]})와 상호 교환합니다.`
          });
          let temp = arr[pivotIdx];
          arr[pivotIdx] = arr[j];
          arr[j] = temp;
        }

        sortedIndices.add(j);
        stepsList.push({
          array: [...arr],
          comparing: [],
          swapping: [],
          sorted: Array.from(sortedIndices),
          pivot: -1,
          left: -1,
          right: -1,
          compareCount,
          swapCount,
          desc: `피벗이었던 ${pivotVal}이 중심 위치(인덱스 ${j})에 최종 안착하여 자리를 확정 지었습니다.`
        });

        quickSortHelper(l, j - 1);
        quickSortHelper(j + 1, r);
      };

      quickSortHelper(0, arr.length - 1);

      stepsList.push({
        array: [...arr],
        comparing: [],
        swapping: [],
        sorted: Array.from({ length: arr.length }, (_, k) => k),
        pivot: -1,
        left: -1,
        right: -1,
        compareCount,
        swapCount,
        desc: "모든 분할 구역의 정렬이 끝나 배열 정렬이 완벽하게 정리되었습니다! ⚡"
      });

      return stepsList;
    };

    function App() {
      const [selectedAlgo, setSelectedAlgo] = useState('selection');
      const [array, setArray] = useState([29, 10, 14, 37, 13, 8, 25, 42]);
      const [customInput, setCustomInput] = useState("29, 10, 14, 37, 13, 8, 25, 42");
      
      const [steps, setSteps] = useState(() => generateSelectionSortSteps([29, 10, 14, 37, 13, 8, 25, 42]));
      const [currentStepIdx, setCurrentStepIdx] = useState(0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [speed, setSpeed] = useState(1500);

      // 설정 배열 혹은 타겟 알고리즘 전환에 따른 시뮬레이터 수명 주기 처리
      useEffect(() => {
        setIsPlaying(false);
        const generated = selectedAlgo === 'selection' 
          ? generateSelectionSortSteps(array)
          : generateQuickSortSteps(array);

        setSteps(generated);
        setCurrentStepIdx(0);
      }, [array, selectedAlgo]);

      // 브라우저 렌더러 메모리를 점유하지 않는 반응형 타이머 이펙트
      useEffect(() => {
        if (!isPlaying) return;

        if (currentStepIdx >= steps.length - 1) {
          setIsPlaying(false);
          return;
        }

        const timer = setTimeout(() => {
          setCurrentStepIdx((prev) => prev + 1);
        }, speed);

        return () => clearTimeout(timer);
      }, [isPlaying, currentStepIdx, steps.length, speed]);

      const handleRandomize = () => {
        const randomArr = Array.from({ length: 8 }, () => Math.floor(Math.random() * 41) + 8);
        setArray(randomArr);
        setCustomInput(randomArr.join(', '));
      };

      const handleApplyCustom = () => {
        const parsed = customInput
          .split(',')
          .map(v => parseInt(v.trim()))
          .filter(v => !isNaN(v));

        if (parsed.length < 3 || parsed.length > 12) {
          alert("배열 크기는 3개부터 12개 사이로 조율해 주세요.");
          return;
        }
        setArray(parsed);
      };

      const currentStep = steps[currentStepIdx] || {
        array: array,
        comparing: [],
        swapping: [],
        sorted: [],
        pivot: -1,
        left: -1,
        right: -1,
        compareCount: 0,
        swapCount: 0,
        desc: ""
      };

      return (
        <div className="min-h-screen bg-slate-50/70 text-slate-800 font-sans flex flex-col justify-between p-4 md:p-6 select-none">
          
          {/* 화사한 헤더 디자인 */}
          <header className="max-w-5xl w-full mx-auto mb-6 text-center space-y-2 mt-2">
            <div className="inline-flex items-center gap-1 bg-teal-50 text-teal-600 font-extrabold text-xs px-3.5 py-1.5 rounded-full border border-teal-100 shadow-sm">
              <BookOpenIcon />
              중고교 알고리즘 연계 보조 도구
            </div>
            <h1 className="text-2xl md:text-3xl font-black text-teal-800 tracking-tight">
              한눈에 보는 정렬 알고리즘 시각화 발전소
            </h1>
            <p className="text-slate-500 text-sm max-w-xl mx-auto leading-relaxed">
              배열 원소들이 스스로 자리를 변경하는 과정을 추적하며, 두 정렬 알고리즘의 실시간 수행 연산 차이를 직접 검측하세요.
            </p>
          </header>

          {/* 메인 대시보드 구조 */}
          <main className="flex-1 max-w-5xl w-full mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            {/* 왼쪽: 비주얼 라이저 시뮬레이터 (2/3 면적) */}
            <div className="lg:col-span-2 space-y-6 flex flex-col justify-between">
              
              {/* 알고리즘 유형 선택 바 */}
              <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200/65 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div className="flex items-center gap-2">
                  <span className="w-2.5 h-2.5 bg-teal-500 rounded-full animate-ping"></span>
                  <span className="text-xs font-bold text-slate-400">정렬 모드:</span>
                  <span className="text-sm font-black text-slate-700">
                    {selectedAlgo === 'selection' ? '선택 정렬 (Selection Sort)' : '퀵 정렬 (Quick Sort)'}
                  </span>
                </div>

                <div className="flex bg-slate-100 p-1 rounded-xl border border-slate-200">
                  <button
                    onClick={() => { setSelectedAlgo('selection'); setIsPlaying(false); }}
                    className={`px-4 py-2 text-xs font-bold rounded-lg transition-all ${
                      selectedAlgo === 'selection'
                        ? 'bg-teal-600 text-white shadow-sm'
                        : 'text-slate-500 hover:text-slate-800'
                    }`}
                  >
                    선택 정렬
                  </button>
                  <button
                    onClick={() => { setSelectedAlgo('quick'); setIsPlaying(false); }}
                    className={`px-4 py-2 text-xs font-bold rounded-lg transition-all ${
                      selectedAlgo === 'quick'
                        ? 'bg-indigo-600 text-white shadow-sm'
                        : 'text-slate-500 hover:text-slate-800'
                    }`}
                  >
                    퀵 정렬
                  </button>
                </div>
              </div>

              {/* 메인 캔버스 디스플레이 */}
              <div className="bg-white rounded-3xl p-6 shadow-md border border-slate-200/60 flex-1 flex flex-col justify-between min-h-[380px]">
                
                {/* 정량 지표 */}
                <div className="flex justify-between items-center text-xs mb-6 border-b pb-3 border-slate-100">
                  <span className="font-bold text-slate-500">
                    수행 단계: <span className="text-teal-600 font-extrabold">{currentStepIdx + 1}</span> / {steps.length}
                  </span>
                  <div className="flex items-center gap-3 text-[10px] md:text-xs">
                    <span className="flex items-center gap-1"><span className="w-3 h-3 bg-teal-400 rounded-sm"></span> 정렬 완료</span>
                    <span className="flex items-center gap-1"><span className="w-3 h-3 bg-rose-400 rounded-sm"></span> 비교 대상</span>
                    <span className="flex items-center gap-1"><span className="w-3 h-3 bg-amber-400 rounded-sm"></span> 위치 교환</span>
                    {selectedAlgo === 'quick' && (
                      <span className="flex items-center gap-1"><span className="w-3 h-3 bg-indigo-600 rounded-sm"></span> 피벗(대장)</span>
                    )}
                  </div>
                </div>

                {/* 정량 컬럼 그래픽 */}
                <div className="h-64 md:h-72 flex items-end justify-center gap-3 md:gap-5 pb-6 border-b border-slate-100 mb-6 w-full">
                  {currentStep.array.map((val, idx) => {
                    let barColor = "bg-teal-50 hover:bg-teal-100/80 border-teal-200/80 text-teal-800";
                    let highlightLabel = "";

                    if (currentStep.sorted.includes(idx)) {
                      barColor = "bg-emerald-400 text-white border-emerald-500 shadow-sm shadow-emerald-400/20";
                    } else if (currentStep.swapping.includes(idx)) {
                      barColor = "bg-amber-400 text-slate-900 border-amber-500 animate-pulse";
                      highlightLabel = "교환";
                    } else if (currentStep.comparing.includes(idx)) {
                      barColor = "bg-rose-400 text-white border-rose-500 animate-bounce";
                      highlightLabel = "비교";
                    } else if (selectedAlgo === 'quick' && idx === currentStep.pivot) {
                      barColor = "bg-indigo-600 text-white border-indigo-700 shadow-md shadow-indigo-600/25";
                      highlightLabel = "Pivot";
                    } else if (selectedAlgo === 'quick' && idx === currentStep.left) {
                      barColor = "bg-indigo-200 text-indigo-900 border-indigo-300";
                      highlightLabel = "i";
                    } else if (selectedAlgo === 'quick' && idx === currentStep.right) {
                      barColor = "bg-purple-200 text-purple-900 border-purple-300";
                      highlightLabel = "j";
                    }

                    const percentHeight = Math.max((val / 50) * 85, 20);

                    return (
                      <div key={idx} className="flex-1 flex flex-col items-center justify-end h-full relative">
                        <div className="absolute top-0 text-[9px] font-bold text-center text-slate-400 leading-none h-6 flex items-center justify-center">
                          {highlightLabel && <span className="px-1.5 py-0.5 bg-slate-100 rounded text-slate-600 shadow-sm border">{highlightLabel}</span>}
                        </div>

                        <div
                          style={{ height: `${percentHeight}%` }}
                          className={`w-full rounded-xl border flex flex-col justify-between items-center py-2 transition-all duration-300 ${barColor}`}
                        >
                          <span className="text-[10px] opacity-75 font-mono">[{idx}]</span>
                          <span className="text-xs md:text-sm font-extrabold">{val}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* 실시간 생중계 말풍선 */}
                <div className="bg-slate-50 rounded-2xl p-4 border border-slate-200 text-center relative shadow-inner">
                  <span className="absolute -top-3 left-6 bg-teal-600 text-white font-extrabold text-[10px] px-2.5 py-0.5 rounded-full shadow-sm">
                    동작 논리 생중계
                  </span>
                  <p className="text-xs md:text-sm text-slate-600 font-semibold leading-relaxed pt-1.5 text-left md:text-center">
                    {currentStep.desc}
                  </p>
                </div>
              </div>

              {/* 제어 리모컨 콘솔 */}
              <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-200/60 flex flex-wrap justify-between items-center gap-4">
                <div className="flex items-center gap-2">
                  <button
                    onClick={() => {
                      setIsPlaying(false);
                      setCurrentStepIdx(prev => Math.max(prev - 1, 0));
                    }}
                    disabled={currentStepIdx === 0}
                    className="p-2.5 bg-slate-50 hover:bg-slate-100 text-slate-600 rounded-xl border border-slate-200 disabled:opacity-35 disabled:hover:bg-slate-50 transition-all"
                    title="이전 프레임"
                  >
                    <PrevIcon />
                  </button>

                  <button
                    onClick={() => setIsPlaying(!isPlaying)}
                    className={`px-5 py-2.5 text-white font-bold rounded-xl transition-all flex items-center gap-1.5 shadow-md ${
                      isPlaying 
                        ? 'bg-amber-500 hover:bg-amber-600 shadow-amber-500/10' 
                        : 'bg-teal-600 hover:bg-teal-700 shadow-teal-600/10'
                    }`}
                  >
                    {isPlaying ? <PauseIcon /> : <PlayIcon />}
                    <span className="text-xs md:text-sm">{isPlaying ? '일시정지' : '자동재생'}</span>
                  </button>

                  <button
                    onClick={() => {
                      setIsPlaying(false);
                      setCurrentStepIdx(prev => Math.min(prev + 1, steps.length - 1));
                    }}
                    disabled={currentStepIdx === steps.length - 1}
                    className="p-2.5 bg-slate-50 hover:bg-slate-100 text-slate-600 rounded-xl border border-slate-200 disabled:opacity-35 disabled:hover:bg-slate-50 transition-all"
                    title="다음 프레임"
                  >
                    <NextIcon />
                  </button>
                </div>

                <div className="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-xl border border-slate-100">
                  <span className="text-xs text-slate-400 font-bold">지연 시간 조절:</span>
                  <input
                    type="range"
                    min="500"
                    max="4000"
                    step="250"
                    value={speed}
                    onChange={(e) => setSpeed(parseInt(e.target.value))}
                    className="w-20 md:w-28 h-1.5 bg-teal-100 rounded-lg appearance-none cursor-pointer accent-teal-600"
                  />
                  <span className="text-xs font-mono font-bold text-teal-600">{(speed / 1000).toFixed(2)}초</span>
                </div>

                <div className="flex items-center gap-2">
                  <button
                    onClick={() => {
                      setIsPlaying(false);
                      setCurrentStepIdx(0);
                    }}
                    className="px-3.5 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-xl text-xs flex items-center gap-1 transition-all"
                  >
                    <ResetIcon />
                    초기화
                  </button>
                  <button
                    onClick={handleRandomize}
                    className="px-3.5 py-2 bg-teal-50 hover:bg-teal-100 text-teal-700 border border-teal-100 font-bold rounded-xl text-xs transition-all"
                  >
                    🎲 값 섞기
                  </button>
                </div>
              </div>
            </div>

            {/* 오른쪽: 정밀 실시간 계측기 & 보조 가이드 (1/3 면적) */}
            <div className="space-y-6">
              
              {/* 실시간 연산 계측기 대시보드 */}
              <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-200/60 space-y-4">
                <h3 className="text-sm font-extrabold text-teal-800 flex items-center gap-1 border-b pb-2">
                  📊 실시간 연산 계측기 (Metrics)
                </h3>
                
                <div className="grid grid-cols-2 gap-3 text-center">
                  <div className="bg-rose-50 border border-rose-100 rounded-2xl p-3.5">
                    <span className="text-[10px] font-bold text-rose-500 uppercase block tracking-wider mb-1">
                      누적 값 비교 횟수
                    </span>
                    <span className="text-2xl font-black text-rose-600">
                      {currentStep.compareCount} <span className="text-xs font-medium text-slate-400">회</span>
                    </span>
                  </div>
                  
                  <div className="bg-amber-50 border border-amber-100 rounded-2xl p-3.5">
                    <span className="text-[10px] font-bold text-amber-600 uppercase block tracking-wider mb-1">
                      데이터 교환 횟수
                    </span>
                    <span className="text-2xl font-black text-amber-500">
                      {currentStep.swapCount} <span className="text-xs font-medium text-slate-400">회</span>
                    </span>
                  </div>
                </div>

                <div className="bg-slate-50 p-3.5 rounded-2xl border border-slate-100 text-xs text-slate-500 space-y-2">
                  <p className="font-bold text-slate-600">💡 관찰 가이드:</p>
                  <ul className="list-disc pl-4 space-y-1 text-[11px] leading-relaxed">
                    <li>데이터를 <strong>값 섞기</strong> 후, 두 알고리즘의 최종 <strong>비교 횟수</strong>를 세어보세요.</li>
                    <li>선택 정렬에 비해 퀵 정렬이 얼마나 훨씬 적은 비교 횟수로 전체를 조율하는지 수치로 확인할 수 있습니다.</li>
                  </ul>
                </div>
              </div>

              {/* 수동 배열 값 커스터마이징 */}
              <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-200/60 space-y-3">
                <h3 className="text-xs font-extrabold text-slate-700 flex items-center gap-1">
                  ✏️ 분석 데이터 수동 제어
                </h3>
                <p className="text-[11px] text-slate-400">
                  * 정수형 값을 쉼표(,)로 구분지어 3~12개 사이로 적어 넣어 시각적 분석에 최적화된 시뮬레이션을 가동할 수 있습니다. (추천값 범위: 5 ~ 50)
                </p>
                <div className="flex gap-2">
                  <input
                    type="text"
                    value={customInput}
                    onChange={(e) => setCustomInput(e.target.value)}
                    placeholder="예: 25, 12, 40, 8"
                    className="flex-1 px-3 py-2 border border-slate-200 rounded-xl text-xs font-bold font-mono focus:ring-2 focus:ring-teal-500/20 focus:border-teal-500 focus:outline-none"
                  />
                  <button
                    onClick={handleApplyCustom}
                    className="bg-slate-800 text-white hover:bg-slate-900 font-black px-4 py-2 rounded-xl text-xs transition-all whitespace-nowrap"
                  >
                    반영
                  </button>
                </div>
              </div>

              {/* 교과서 주요 질문 탐구 */}
              <div className="bg-teal-50/50 rounded-3xl p-5 border border-teal-100/80 space-y-3">
                <h4 className="text-xs font-extrabold text-teal-800">📖 교과서 탐구 포인트</h4>
                <ul className="text-[11px] text-teal-900/80 space-y-2 list-disc pl-4 font-semibold">
                  <li>선택 정렬이 1사이클을 돌았을 때 어떤 값이 맨 앞에 안착하는지 정렬 상태를 관찰해 봅시다.</li>
                  <li>퀵 정렬에서 피벗(Pivot) 대상을 다르게 선정했을 때 분할 과정에 차이가 발생하는 이유를 예측해 봅시다.</li>
                </ul>
              </div>

            </div>
          </main>

          {/* 푸터 */}
          <footer className="text-center text-[11px] text-slate-400 font-semibold py-4 mt-6 border-t border-slate-100">
            중고등 교과 연계 보조 시각화 자료실 — 정보 교육 정렬 알고리즘 교재 보완 모듈
          </footer>
        </div>
      );
    }

    // 마운트 엔진 초기화 및 컴파일 렌더링 시작
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
